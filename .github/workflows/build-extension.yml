# filepath: .github/workflows/build-extension.yml
name: Build Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bump manifest.json version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid extension version: $VERSION" >&2
            exit 1
          fi
          VERSION="$VERSION" node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          manifest.version = process.env.VERSION;
          fs.writeFileSync('manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build extension
        run: npm run build

      - name: Verify vendored sanitizer version
        run: grep -Fq 'DOMPurify 3.4.12' content/dompurify.min.js

      - name: Create ZIP package
        run: |
          zip -r mdpi-filter.zip . \
            -x "node_modules/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "README.md" \
            -x "SECURITY.md" \
            -x "PRIVACY_POLICY.md" \
            -x "docs/*" \
            -x "logo.svg" \
            -x "*.zip"

      - name: Upload extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: extension
          path: mdpi-filter.zip
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: mdpi-filter.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
