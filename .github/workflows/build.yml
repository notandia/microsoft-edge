name: Build Extension

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Run security and regression tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Create and verify ZIP package
        run: |
          zip -r mdpi-filter.zip . \
            -x "node_modules/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x "scripts/*" \
            -x "tests/*" \
            -x "package.json" \
            -x "package-lock.json" \
            -x "README.md" \
            -x "SECURITY.md" \
            -x "docs/*" \
            -x "logo.svg" \
            -x "*.zip"
          unzip -t mdpi-filter.zip
          unzip -p mdpi-filter.zip manifest.json | node -e "let s=''; process.stdin.on('data',d=>s+=d).on('end',()=>JSON.parse(s));"
